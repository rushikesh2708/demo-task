
<div class="container">

  <h2>All members</h2>

  <button mat-raised-button color="primary" (click)="openAddDialog()">ADD NEW</button>

  <table mat-table [dataSource]="members" class="mat-elevation-z2">

    <!-- STATUS -->
    <ng-container matColumnDef="status">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let row">
        <mat-chip [color]="row.status === 'Active' ? 'primary' : 'warn'" selected>
          {{row.status}}
        </mat-chip>
      </td>
    </ng-container>

    <!-- NAME -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Name</th>
      <td mat-cell *matCellDef="let row">{{row.name}}</td>
    </ng-container>

    <!-- DOMAIN -->
    <ng-container matColumnDef="domain">
      <th mat-header-cell *matHeaderCellDef>Domain</th>
      <td mat-cell *matCellDef="let row">{{row.domain}}</td>
    </ng-container>

    <!-- MEMBER CLASS -->
    <ng-container matColumnDef="member_class">
      <th mat-header-cell *matHeaderCellDef>Member Class</th>
      <td mat-cell *matCellDef="let row">{{row.member_class}}</td>
    </ng-container>

    <!-- DATE -->
    <ng-container matColumnDef="date_joined">
      <th mat-header-cell *matHeaderCellDef>Date Joined</th>
      <td mat-cell *matCellDef="let row">
        {{row.date_joined | date:'dd/MM/yyyy'}}
      </td>
    </ng-container>

    <!-- LEVEL -->
    <ng-container matColumnDef="level">
      <th mat-header-cell *matHeaderCellDef>Level</th>
      <td mat-cell *matCellDef="let row">{{row.level}}</td>
    </ng-container>

    <!-- ACTION -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef></th>
      <td mat-cell *matCellDef="let row">
        <button mat-button color="primary" (click)="openEditDialog(row)">Edit</button>
        <button mat-button color="warn" (click)="deleteMember(row.id)">Delete</button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumn"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumn;"></tr>

  </table>

  <!-- PAGINATION -->
  <mat-paginator
    [length]="total"
    [pageSize]="limit"
    [pageSizeOptions]="[5,10,15]"
    (page)="onPageChange($event)">
  </mat-paginator>

</div>
